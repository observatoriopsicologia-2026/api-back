<header class="site-header">
  <a class="brand" routerLink="/" aria-label="Inicio Observatorio POT">
    <span class="brand-mark">POT</span>
    <span>
      <strong>Observatorio POT</strong>
      <small>Psicología Organizacional y del Trabajo</small>
    </span>
  </a>

  <button class="icon-button menu-button" type="button" (click)="menuOpen = !menuOpen" aria-label="Abrir navegación">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="main-nav" [class.open]="menuOpen" aria-label="Navegación principal">
    <a
      *ngFor="let item of nav"
      [routerLink]="item.path"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      (click)="menuOpen = false"
    >
      {{ item.label }}
    </a>
  </nav>

  <div class="header-actions">
    <form class="search-form" [class.open]="searchOpen" (ngSubmit)="search()">
      <input
        name="search"
        [(ngModel)]="searchTerm"
        type="search"
        placeholder="Buscar publicaciones"
        aria-label="Buscar publicaciones"
      >
      <button class="icon-button" type="button" (click)="searchOpen = !searchOpen" aria-label="Mostrar búsqueda">⌕</button>
    </form>
    <a class="access-button" routerLink="/admin">{{ auth.isLoggedIn ? 'Admin' : 'Acceder' }}</a>
  </div>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<footer class="site-footer">
  <div>
    <strong>Observatorio POT</strong>
    <p>Análisis, investigación y desarrollo de la Psicología Organizacional y del Trabajo en Iberoamérica.</p>
  </div>
  <div class="footer-links">
    <a routerLink="/publicaciones">Publicaciones</a>
    <a routerLink="/directorio">Directorio</a>
    <a routerLink="/eventos">Eventos</a>
    <a routerLink="/recursos">Recursos</a>
  </div>
</footer>
