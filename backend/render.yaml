services:
  - type: web
    name: observatorio-pot-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: STORAGE_DRIVER
        value: supabase
